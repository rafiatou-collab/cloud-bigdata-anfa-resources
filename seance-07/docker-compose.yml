# docker-compose.yml — Cluster Kafka 3 brokers (KRaft) + Kafka UI + MinIO + Spark
# ──────────────────────────────────────────────────────────────────────────────
# Image Kafka : apache/kafka:4.3.1 (image OFFICIELLE Apache).
#   → Les variables utilisent le préfixe KAFKA_ (et non KAFKA_CFG_ comme Bitnami).
#   → KAFKA_CLUSTER_ID doit être un UUID base64 valide, identique sur les 3 nœuds.
# Image Spark : apache/spark:3.5.8-python3 (même logique qu'en séance 5 :
#   on démarre master/worker via les scripts sbin/ avec SPARK_NO_DAEMONIZE).

services:

  # ──────────────────────────────────────────────────────
  # Broker Kafka 1
  # ──────────────────────────────────────────────────────
  kafka-1:
    image: apache/kafka:4.3.1
    container_name: anfa-kafka-1
    restart: unless-stopped
    ports:
      - "19092:19092"     # port EXTERNE (accessible depuis l'hôte)
    environment:
      # ── Identité du nœud dans le cluster ──
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # ── Quorum KRaft : les 3 nœuds qui participent à la coordination ──
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # ── Écoutes réseau : interne (autres conteneurs), contrôleur, externe (hôte) ──
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # ── Réplication : avec 3 brokers, on réplique chaque partition 3 fois ──
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      # ── Identifiant unique du cluster (UUID base64, partagé par les 3 nœuds) ──
      KAFKA_CLUSTER_ID: "oPDaLQlUQ3Sg_L8LBoc5AA"

  # ──────────────────────────────────────────────────────
  # Broker Kafka 2
  # ──────────────────────────────────────────────────────
  kafka-2:
    image: apache/kafka:4.3.1
    container_name: anfa-kafka-2
    restart: unless-stopped
    ports:
      - "19093:19093"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092,EXTERNAL://localhost:19093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_CLUSTER_ID: "oPDaLQlUQ3Sg_L8LBoc5AA"

  # ──────────────────────────────────────────────────────
  # Broker Kafka 3
  # ──────────────────────────────────────────────────────
  kafka-3:
    image: apache/kafka:4.3.1
    container_name: anfa-kafka-3
    restart: unless-stopped
    ports:
      - "19094:19094"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092,EXTERNAL://localhost:19094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_CLUSTER_ID: "oPDaLQlUQ3Sg_L8LBoc5AA"

  # ──────────────────────────────────────────────────────
  # Kafka UI : interface web pour observer le cluster
  # ──────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: anfa-kafka-ui
    restart: unless-stopped
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: anfa-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3

  # ──────────────────────────────────────────────────────
  # MinIO : destination finale des agrégats Spark Streaming
  # ──────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: anfa-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: anfa-admin
      MINIO_ROOT_PASSWORD: anfa-password-2026
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

  # ──────────────────────────────────────────────────────
  # Spark Master (même logique qu'en séance 5)
  # ──────────────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.8-python3
    container_name: anfa-spark-master
    restart: unless-stopped
    environment:
      - SPARK_NO_DAEMONIZE=true
    ports:
      - "7077:7077"
      - "8091:8080"      # UI Spark sur localhost:8091
    volumes:
      - ./jobs:/opt/jobs
    command: >
      /opt/spark/sbin/start-master.sh

  # ──────────────────────────────────────────────────────
  # Spark Worker (même logique qu'en séance 5)
  # ──────────────────────────────────────────────────────
  spark-worker:
    image: apache/spark:3.5.8-python3
    container_name: anfa-spark-worker
    restart: unless-stopped
    depends_on:
      - spark-master
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1
    volumes:
      - ./jobs:/opt/jobs
    command: >
      /opt/spark/sbin/start-worker.sh spark://spark-master:7077

volumes:
  minio-data:
